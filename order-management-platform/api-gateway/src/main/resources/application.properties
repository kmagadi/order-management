server:
    port: 8080

spring:
    application:
        name: api-gateway

cloud:
    gateway:
        routes:
            - id: auth-service
            uri: lb://AUTH-SERVICE
            predicates:
                - Path=/auth/**

            - id: order-service
            uri: lb://ORDER-SERVICE
            predicates:
                - Path=/orders/**

            - id: analytics-service
            uri: lb://ANALYTICS-SERVICE
            predicates:
                - Path=/analytics/**

eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/